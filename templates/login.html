<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CareerPath AI</title>
    <!-- Import Google Fonts (Plus Jakarta Sans) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --bg-dark: var(--bg-dark-base);
            --card-bg: rgba(17, 24, 39, 0.45);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: var(--text-primary);
            --text-muted: var(--text-secondary);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 80% 20%, #17153a 0%, var(--bg-dark-base) 80%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Glowing background accents */
        .glowing-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(59, 130, 246, 0) 70%);
            top: 10%;
            left: 10%;
            z-index: 0;
            pointer-events: none;
        }

        .auth-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 45px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            text-align: center;
            transition: all 0.3s ease;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--text-bright);
            font-size: 1.1rem;
        }

        .logo-text {
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-bright);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 400;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 0.95rem;
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid var(--border-lighter);
            border-radius: 12px;
            color: var(--text-bright);
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            background: rgba(17, 24, 39, 0.6);
            box-shadow: 0 0 18px rgba(59, 130, 246, 0.25);
        }

        .flash-messages {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            text-align: left;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
            font-family: inherit;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.35);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .footer-text a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body>
    <header class="auth-header" style="width: 100%; max-width: 1200px; margin: 0 auto; display: flex; justify-content: flex-start; align-items: center; padding: 25px 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 100;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
            <div style="width: 36px; height: 36px; background: linear-gradient(135deg, #3b82f6, #10b981); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 1.25rem;">C</div>
            <div style="font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;">CareerPath AI</div>
        </a>
    </header>
    <div class="glowing-orb"></div>
    <div class="auth-card">
        
        <!-- Brand Logo -->
        <div class="logo-container">
            <div class="logo-icon">C</div>
            <div class="logo-text">CareerPath AI</div>
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to manage your learning roadmap</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <p>⚠️ {{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password" autocomplete="current-password">
            </div>
            <button type="submit">Sign In</button>
        </form>

        <p class="footer-text">
            Don't have an account? <a href="/signup">Sign Up</a>
        </p>
    </div>
    <script src="/static/theme.js"></script>
</body>
</html>
